name: Compilar CEF com Codecs Proprietários

on:
  workflow_dispatch: # Permite iniciar o build manualmente

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código do seu repositório
        uses: actions/checkout@v4

      - name: Instalar Dependências do Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 bison flex ninja-build git-core curl zip unzip

      - name: Rodar o Build do Linux
        run: |
          # Define as variáveis para garantir que o script baixe e prepare os codecs proprietários
          export GN_DEFINES="proprietary_codecs=true ffmpeg_branding=\"Chrome\" is_official_build=true symbol_level=0"
          
          # Dá permissão de execução e roda o script de build oficial do seu repositório
          chmod +x ./build-linux.sh
          ./build-linux.sh

      - name: Salvar os Arquivos Compilados (Artefatos)
        uses: actions/upload-artifact@v4
        with:
          name: cef-linux-x64-fixed
          path: |
            *.zip
            *.tar.gz
            **/libcef.so
            **/*.pak
            **/*.bin
