name: Compilar CEF com Codecs Proprietários

on:
  workflow_dispatch: # Permite rodar manualmente pela aba Actions

jobs:
  build-linux:
    name: Compilar para Linux 64-bit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgtk-3-dev \
            libgtkglext1-dev \
            python3 \
            python3-pip \
            python3-six
          
          # Garante a instalação do six via pip no escopo do sistema e do usuário
          python3 -m pip install --break-system-packages six || true
          python3 -m pip install --user --break-system-packages six || true

      - name: Rodar o Build do Linux
        run: |
          # Define as variáveis para garantir que o script prepare os codecs proprietários
          export GN_DEFINES="proprietary_codecs=true ffmpeg_branding=\"Chrome\" is_official_build=true symbol_level=0"
          
          # Força o Python a procurar bibliotecas na pasta global e de usuário (resolve o erro do gsutil)
          export PYTHONPATH="/usr/lib/python3/dist-packages:/usr/local/lib/python3.10/dist-packages:$HOME/.local/lib/python3.10/site-packages"
          
          # Dá permissão de execução
          chmod +x ./build-linux.sh
          
          # Roda o script usando Bash
          bash ./build-linux.sh

      - name: Upload do Artifact (Resultado)
        uses: actions/upload-artifact@v4
        with:
          name: cef-linux64-proprietario
          path: dist/cef-linux64.zip
