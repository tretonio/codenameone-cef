name: Compilar CEF com Codecs Proprietários

on:
  workflow_dispatch: # Permite rodar manualmente pela aba Actions

jobs:
  build-linux:
    name: Compilar para Linux 64-bit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgtk-3-dev \
            libgtkglext1-dev \
            python3 \
            python3-pip
          
          # Instala a biblioteca "six" necessária para os scripts internos de build do Chromium/gsutil
          python3 -m pip install --break-system-packages six || python3 -m pip install six

      - name: Rodar o Build do Linux
        run: |
          # Define as variáveis para garantir que o script prepare os codecs proprietários
          export GN_DEFINES="proprietary_codecs=true ffmpeg_branding=\"Chrome\" is_official_build=true symbol_level=0"
          
          # Dá permissão de execução
          chmod +x ./build-linux.sh
          
          # Roda o script usando Bash
          bash ./build-linux.sh

      - name: Upload do Artifact (Resultado)
        uses: actions/upload-artifact@v4
        with:
          name: cef-linux64-proprietario
          path: dist/cef-linux64.zip
