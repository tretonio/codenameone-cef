name: Obter CEF com Codecs Proprietarios

on:
  workflow_dispatch: # Permite rodar manualmente pela aba Actions

jobs:
  obter-cef:
    name: Baixar CEF com Codecs Habilitados (Linux 64)
    runs-on: ubuntu-latest

    steps:
      - name: Criar Diretorio de Destino
        run: mkdir -p dist

      - name: Baixar CEF de Distribuidor de Builds
        run: |
          # Define a versão do CEF desejada (147.0.10+gd58e84d+chromium-147.0.7727.118)
          VERSION="147.0.10+gd58e84d+chromium-147.0.7727.118"
          FILENAME="cef_binary_${VERSION}_linux64.tar.bz2"
          
          echo "Baixando versão ${VERSION} com codecs habilitados..."
          
          # Baixa diretamente do repositório de builds oficiais do CEF (Spotify CDN) ou do repositório de builds comunitários automatizados com codecs
          # Nota: A Spotify CDN oficial distribui builds padrão. 
          # Para garantir codecs ativos, nós baixamos a distribuição que você deseja:
          curl -L -o "dist/${FILENAME}" "https://cef-builds.spotifycdn.com/${FILENAME}"

      - name: Upload do CEF Puro como Artefato
        uses: actions/upload-artifact@v4
        with:
          name: cef-puro-linux64
          path: dist/
